<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Judge Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            background-color: #d0f0c0; /* Light green background */
            font-family: Arial, sans-serif;
            min-height: 100vh;
        }

        .container {
            max-width: 700px;
            margin: 50px auto;
            padding: 30px;
            background-color: #ffffff; /* white card */
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #064635;
            font-weight: bold;
        }

        h4 {
            margin-top: 20px;
            color: #0b8f63;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            border: 1px solid #0b8f63;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #0b8f63;
            color: white;
        }

        td {
            background-color: #cce8c2;
        }

        .back-link {
            display: block;
            margin-bottom: 20px;
            text-decoration: none;
            color: #064635;
            font-weight: bold;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">

    <a th:href="@{/judges}" class="back-link">⬅ Back to Judges</a>

    <h2 th:text="${judge.name}"></h2>

    <h4>Dogs to Judge</h4>

    <table>
        <thead>
            <tr>
                <th>Dog</th>
                <th>Owner</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="dog : ${judge.dogs}">
                <td th:text="${dog.name}"></td>
                <td th:text="${dog.owner != null ? dog.owner.firstName + ' ' + dog.owner.lastName : 'None'}"></td>
            </tr>
        </tbody>
    </table>

</div>

</body>
</html>
