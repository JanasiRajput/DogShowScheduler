<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Judge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            background-color: #d0f0c0; /* Light green background */
            font-family: Arial, sans-serif;
            min-height: 100vh;
        }

        .container {
            max-width: 500px;
            margin-top: 50px;
            padding: 30px;
            background-color: #ffffff; /* white card */
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #064635;
            font-weight: bold;
        }

        input[type="text"] {
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #064635;
            width: 100%;
            margin-bottom: 15px;
        }

        button {
            background-color: #0b8f63;
            color: #fff;
            border: none;
            padding: 10px 20px;
            width: 100%;
            font-weight: bold;
            border-radius: 10px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #0a7d56;
        }

        .back-link {
            display: block;
            margin-top: 15px;
            text-align: center;
            color: #064635;
            text-decoration: none;
            font-weight: bold;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Add Judge</h2>

    <form th:action="@{/judges/add}" method="post">
        <input type="text" 
               name="name" 
               placeholder="Judge Name" 
               required>

        <button type="submit">Save</button>
    </form>

    <a th:href="@{/judges}" class="back-link">⬅ Back to Judges</a>
</div>

</body>
</html>
