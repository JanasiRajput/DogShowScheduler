<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Judges</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #e6f4ea; /* Soft green background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 50px auto;
            padding: 40px;
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
            color: #064635;
            font-weight: 700;
            margin-bottom: 30px;
            text-shadow: 1px 1px #a3d9a5;
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .btn-green {
            background-color: #0b8f63;
            color: #ffffff;
            font-weight: 600;
            border-radius: 12px;
            padding: 10px 25px;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn-green:hover {
            background-color: #0a7d56;
            color: #ffffff;
        }

        .banner-img {
            display: block;
            margin: 0 auto 30px auto;
            max-width: 300px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }

        th {
            background-color: #0b8f63;
            color: #ffffff;
            padding: 12px;
            border-radius: 12px 12px 0 0;
            text-align: left;
        }

        td {
            background-color: #cce8c2;
            padding: 12px;
            border-radius: 0 0 12px 12px;
        }

        tr {
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        a.details-btn {
            background-color: #0b8f63;
            color: #ffffff;
            padding: 6px 14px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        a.details-btn:hover {
            background-color: #0a7d56;
            color: #ffffff;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- Banner Image -->
    <img th:src="@{/image/dog2.jpg}" alt="Dog Banner" class="banner-img">

    <!-- Navigation -->
    <div class="nav-buttons">
        <a th:href="@{/}" class="btn-green">Home</a>
        <a th:href="@{/judges/add}" class="btn-green">Add Judge</a>
    </div>

    <h2>All Judges</h2>

    <table>
        <thead>
            <tr>
                <th>Judge</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="judge : ${judges}">
                <td th:text="${judge.name}"></td>
                <td>
                    <a th:href="@{'/judges/' + ${judge.id}}" class="details-btn">Details</a>
                </td>
            </tr>
        </tbody>
    </table>

</div>

</body>
</html>
