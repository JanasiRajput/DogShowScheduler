<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>All Owners</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #d0f0c0; /* Light green background */
            font-family: 'Montserrat', Arial, sans-serif;
            color: #064635;
            min-height: 100vh;
            padding-top: 50px;
        }

        .navbar {
            background-color: #0b8f63;
        }

        .navbar-brand {
            color: #ffffff;
            font-weight: 700;
            font-size: 1.5rem;
            text-align: center;
            margin: 0 auto;
        }

        .card {
            background-color: #ffffff;
            border-radius: 15px;
            padding: 30px;
            max-width: 800px;
            margin: 0 auto 50px auto;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
            font-weight: 700;
            margin-bottom: 25px;
            color: #064635;
            text-shadow: 1px 1px #a3d9a5;
        }

        .btn-green {
            background-color: #0b8f63;
            color: #ffffff;
            font-weight: 600;
            border-radius: 10px;
            padding: 8px 20px;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .btn-green:hover {
            background-color: #09744f;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        th, td {
            text-align: left;
            padding: 12px 15px;
        }

        thead {
            background-color: #0b8f63;
            color: #ffffff;
            font-weight: 600;
        }

        tbody tr:nth-child(even) {
            background-color: #e8f5e9;
        }

        tbody tr:hover {
            background-color: #cce8c2;
        }

        .btn-sm-green {
            background-color: #0b8f63;
            color: white;
            font-weight: 600;
            border-radius: 8px;
            padding: 5px 10px;
        }

        .btn-sm-green:hover {
            background-color: #09744f;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark">
    <div class="container justify-content-center">
        <a th:href="@{/}" class="navbar-brand">🏠 Home</a>
    </div>
</nav>

<div class="card mt-5">
    <h2>All Owners</h2>
    <a th:href="@{/owners/add}" class="btn btn-green mb-3 d-block mx-auto w-50">Add Owner</a>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>View</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="owner : ${owners}">
                <td th:text="${owner.firstName + ' ' + owner.lastName}"></td>
                <td>
                    <a th:href="@{'/owners/' + ${owner.id}}" class="btn-sm-green">Details</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
