<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Owner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #d0f0c0; /* Light green background */
            font-family: 'Montserrat', Arial, sans-serif;
            color: #064635;
            min-height: 100vh;
            padding-top: 50px;
        }

        .navbar {
            background-color: #0b8f63;
        }

        .navbar-brand {
            color: #ffffff;
            font-weight: 700;
            font-size: 1.5rem;
            text-align: center;
            margin: 0 auto;
        }

        .card {
            background-color: #ffffff;
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
            font-weight: 700;
            margin-bottom: 25px;
            color: #064635;
            text-shadow: 1px 1px #a3d9a5;
        }

        .form-control {
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #0b8f63;
        }

        .btn-green {
            background-color: #0b8f63;
            color: #ffffff;
            font-weight: 600;
            border-radius: 12px;
            padding: 10px 25px;
            width: 100%;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-green:hover {
            background-color: #09744f;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark">
    <div class="container justify-content-center">
        <a th:href="@{/}" class="navbar-brand">🏠 Home</a>
    </div>
</nav>

<div class="card mt-5">
    <h2>Add Owner</h2>

    <form th:action="@{/owners/add}" method="post">
        <input type="text" name="firstName" placeholder="First Name" class="form-control" required>
        <input type="text" name="lastName" placeholder="Last Name" class="form-control" required>
        <button class="btn-green" type="submit">Save</button>
    </form>
</div>

</body>
</html>
