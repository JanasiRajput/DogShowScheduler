<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Owner Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #d0f0c0; /* Light green background */
            font-family: 'Montserrat', Arial, sans-serif;
            color: #064635;
            min-height: 100vh;
            padding-top: 50px;
        }

        .navbar {
            background-color: #0b8f63;
        }

        .navbar-brand {
            color: #ffffff;
            font-weight: 700;
            font-size: 1.5rem;
            margin: 0 auto;
            text-align: center;
        }

        .card {
            background-color: #ffffff;
            border-radius: 15px;
            padding: 30px;
            max-width: 800px;
            margin: 0 auto 50px auto;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
            font-weight: 700;
            margin-bottom: 25px;
            color: #064635;
            text-shadow: 1px 1px #a3d9a5;
        }

        h4 {
            margin-top: 30px;
            margin-bottom: 15px;
            color: #064635;
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        th, td {
            text-align: left;
            padding: 12px 15px;
        }

        thead th {
            background-color: #0b8f63;
            color: #ffffff;
            font-weight: 600;
        }

        tbody tr:nth-child(even) {
            background-color: #e8f5e9;
        }

        tbody tr:hover {
            background-color: #cce8c2;
        }

        .btn-back {
            display: inline-block;
            margin-bottom: 20px;
            background-color: #0b8f63;
            color: white;
            font-weight: 600;
            padding: 8px 20px;
            border-radius: 10px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            background-color: #09744f;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

    </style>
</head>
<body>

<nav class="navbar navbar-dark">
    <div class="container justify-content-center">
        <a th:href="@{/}" class="navbar-brand">🏠 Home</a>
    </div>
</nav>

<div class="card mt-5">
    <a th:href="@{/owners}" class="btn-back">⬅ Back to Owners</a>

    <h2 th:text="${owner.firstName + ' ' + owner.lastName}">Owner Name</h2>

    <h4>Dogs Owned</h4>
    <table>
        <thead>
            <tr>
                <th>Dog Name</th>
                <th>Judges</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="dog : ${owner.dogs}">
                <td th:text="${dog.name}">Dog Name</td>
                <td>
                    <span th:each="judge, iterStat : ${dog.judges}">
                        <span th:text="${judge.name}">Judge Name</span><span th:if="${!iterStat.last}">, </span>
                    </span>
                </td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
