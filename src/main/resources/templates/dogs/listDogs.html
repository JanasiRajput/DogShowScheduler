<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dogs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #d0f0c0; /* Light green background */
            font-family: 'Montserrat', Arial, sans-serif;
            color: #064635;
            min-height: 100vh;
            padding-top: 50px;
        }

        .navbar {
            background-color: #0b8f63;
        }

        .navbar-brand {
            color: #ffffff;
            font-weight: 700;
            font-size: 1.5rem;
            text-align: center;
            margin: 0 auto;
        }

        .card {
            background-color: #ffffff;
            border-radius: 15px;
            padding: 30px;
            max-width: 800px;
            margin: 0 auto 50px auto;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
            font-weight: 700;
            margin-bottom: 20px;
            text-shadow: 1px 1px #a3d9a5;
        }

        .btn-green {
            background-color: #0b8f63;
            color: #ffffff;
            font-weight: 600;
            border-radius: 12px;
            padding: 8px 20px;
            margin: 5px;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn-green:hover {
            background-color: #09744f;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            color: #ffffff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table th, table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #0b8f63;
        }

        table th {
            font-weight: 700;
        }

        a.details-btn {
            background-color: #0b8f63;
            color: #fff;
            padding: 6px 12px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        a.details-btn:hover {
            background-color: #09744f;
            transform: translateY(-1px);
        }

        .button-container {
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark">
    <div class="container justify-content-center">
        <a th:href="@{/}" class="navbar-brand">🏠 Home</a>
    </div>
</nav>

<div class="card mt-5">
<img th:src="@{/image/petdog.jpg}" alt="Owners">
    <h2>All Dogs</h2>

    <div class="button-container">
        <a th:href="@{/dogs/add}" class="btn-green">Add Dog</a>
        <a th:href="@{/dogs/assignOwner}" class="btn-green">Assign Owner</a>
        <a th:href="@{/dogs/assignJudge}" class="btn-green">Assign Judge</a>
    </div>

    <table>
        <thead>
            <tr>
                <th>Dog Name</th>
                <th>Details</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="dog : ${dogs}">
                <td th:text="${dog.name}">Dog Name</td>
                <td>
                    <a th:href="@{'/dogs/' + ${dog.id}}" class="details-btn">View Details</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
