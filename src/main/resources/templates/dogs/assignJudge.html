<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Assign Judge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #d0f0c0; /* Light green background */
            font-family: 'Montserrat', Arial, sans-serif;
            color: #064635;
            min-height: 100vh;
            padding-top: 50px;
        }

        .navbar {
            background-color: #0b8f63; /* Dark green navbar */
        }

        .navbar-brand {
            color: #ffffff;
            font-weight: 700;
            font-size: 1.5rem;
            text-align: center;
            margin: 0 auto;
        }

        h2 {
            text-align: center;
            font-weight: 700;
            margin-bottom: 30px;
            text-shadow: 1px 1px #a3d9a5;
        }

        .card {
            background-color: #ffffff; /* White card */
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            margin: 0 auto 50px auto;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        select.form-select {
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #0b8f63;
        }

        .btn-green {
            background-color: #0b8f63;
            color: #ffffff;
            font-weight: 600;
            border-radius: 12px;
            padding: 12px 25px;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn-green:hover {
            background-color: #09744f;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #064635;
            font-weight: 600;
            text-decoration: none;
            transition: 0.3s;
        }

        .back-link:hover {
            color: #0a7d56;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark">
    <div class="container justify-content-center">
        <a th:href="@{/}" class="navbar-brand">🏠 Home</a>
    </div>
</nav>

<div class="card mt-5">
    <a th:href="@{/dogs}" class="back-link">⬅ Back to Dogs</a>
    <img th:src="@{/image/dog2.jpg}" alt="Owners">

    <h2>Assign Judge to Dog</h2>

    <form th:action="@{/dogs/assignJudge}" method="post">
        <select name="dogId" class="form-select" required>
            <option value="">Select Dog</option>
            <option th:each="dog : ${dogs}" th:value="${dog.id}" th:text="${dog.name}"></option>
        </select>

        <select name="judgeId" class="form-select" required>
            <option value="">Select Judge</option>
            <option th:each="judge : ${judges}" th:value="${judge.id}" th:text="${judge.name}"></option>
        </select>

        <button type="submit" class="btn btn-green">Assign Judge</button>
    </form>
</div>

</body>
</html>
