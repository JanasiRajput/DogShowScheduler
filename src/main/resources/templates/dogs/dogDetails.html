<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dog Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #d0f0c0; /* Light green background */
            font-family: 'Montserrat', Arial, sans-serif;
            color: #064635;
            min-height: 100vh;
            padding-top: 50px;
        }

        .navbar {
            background-color: #0b8f63;
        }

        .navbar-brand {
            color: #ffffff;
            font-weight: 700;
            font-size: 1.5rem;
            text-align: center;
            margin: 0 auto;
        }

        .card {
            background-color: #ffffff;
            border-radius: 15px;
            padding: 30px;
            max-width: 600px;
            margin: 0 auto 50px auto;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
            font-weight: 700;
            margin-bottom: 20px;
            text-shadow: 1px 1px #a3d9a5;
        }

        h4 {
            margin-top: 25px;
            font-weight: 600;
            color: #0b8f63;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        table th, table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #0b8f63;
        }

        .btn-green {
            background-color: #0b8f63;
            color: #ffffff;
            font-weight: 600;
            border-radius: 12px;
            padding: 8px 20px;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn-green:hover {
            background-color: #09744f;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            color: #ffffff;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #064635;
            font-weight: 600;
            text-decoration: none;
            transition: 0.3s;
        }

        .back-link:hover {
            color: #0a7d56;
            text-decoration: underline;
        }

        .owner-info {
            margin-bottom: 20px;
            font-size: 1rem;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark">
    <div class="container justify-content-center">
        <a th:href="@{/}" class="navbar-brand">🏠 Home</a>
    </div>
</nav>

<div class="card mt-5">
    <a th:href="@{/dogs}" class="back-link">⬅ Back to Dogs</a>

    <h2 th:text="${dog.name}">Dog Name</h2>

    <p class="owner-info">
        <strong>Owner:</strong>
        <span th:text="${dog.owner != null ? dog.owner.firstName + ' ' + dog.owner.lastName : 'None'}">Owner Name</span>
    </p>

    <h4>Judges</h4>
    <table>
        <thead>
            <tr>
                <th>Judge</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="judge : ${dog.judges}">
                <td th:text="${judge.name}">Judge Name</td>
                <td>
                    <a th:href="@{/dogs/removeJudge(dogId=${dog.id}, judgeId=${judge.id})}" class="btn-green">
                        Remove
                    </a>
                </td>
            </tr>
        </tbody>
    </table>

</div>

</body>
</html>
