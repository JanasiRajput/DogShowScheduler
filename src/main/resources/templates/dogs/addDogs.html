<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Dog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #d0f0c0; /* Light green background */
            font-family: 'Montserrat', Arial, sans-serif;
            color: #064635;
            min-height: 100vh;
            padding-top: 50px;
        }

        .navbar {
            background-color: #0b8f63; /* Dark green navbar */
        }

        .navbar-brand {
            color: #ffffff;
            font-weight: 700;
            font-size: 1.5rem;
            text-align: center;
            margin: 0 auto;
        }

        h2 {
            text-align: center;
            font-weight: 700;
            margin-bottom: 30px;
            text-shadow: 1px 1px #a3d9a5;
        }

        .card {
            background-color: #ffffff; /* White card for contrast */
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            margin: 0 auto 50px auto;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        input.form-control {
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #0b8f63;
        }

        .btn-green {
            background-color: #0b8f63;
            color: #ffffff;
            font-weight: 600;
            border-radius: 12px;
            padding: 12px 25px;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn-green:hover {
            background-color: #09744f;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        @media(max-width: 576px){
            h2 { font-size: 2rem; }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark">
    <div class="container justify-content-center">
        <a th:href="@{/}" class="navbar-brand">🏠 Home</a>
    </div>
</nav>

<div class="card mt-5">
 <img th:src="@{/image/dog1.jpg}" alt="Owners">
    <h2>Add Dog</h2>

    <form th:action="@{/dogs/add}" th:object="${dog}" method="post">
        <input type="text" th:field="*{name}" placeholder="Dog Name" class="form-control" required>
        <button type="submit" class="btn btn-green">Save Dog</button>
    </form>
</div>

</body>
</html>
